<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 635.0865 390" width="100%" height="auto" style="--bg:#282a36;--fg:#f8f8f2;--line:#6272a4;--accent:#bd93f9;--muted:#6272a4">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="SDK" x1="78.4675" y1="70" x2="78.4675" y2="360" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Bridge" x1="218.4675" y1="70" x2="218.4675" y2="360" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Bus" x1="358.4675" y1="70" x2="358.4675" y2="360" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Reg" x1="514.6685" y1="70" x2="514.6685" y2="360" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="SDK" data-to="Bridge" data-label="HookCallback()" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="78.4675" y1="90" x2="218.4675" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="148.4675" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">HookCallback()</text>
</g>
<g class="message" data-from="Bridge" data-to="Bus" data-label="dispatch()" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="218.4675" y1="130" x2="358.4675" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="288.4675" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">dispatch()</text>
</g>
<g class="message" data-from="Bridge" data-to="Reg" data-label="execute()" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="218.4675" y1="170" x2="514.6685" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="366.568" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">execute()</text>
</g>
<g class="message" data-from="Reg" data-to="Reg" data-label="handler()" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="514.6685,210 544.6685,210 544.6685,230 514.6685,230" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="552.6685" y="220" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">handler()</text>
</g>
<g class="message" data-from="Reg" data-to="Bridge" data-label="HookJSONOutput" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="514.6685" y1="280" x2="218.4675" y2="280" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="366.568" y="270" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">HookJSONOutput</text>
</g>
<g class="message" data-from="Bridge" data-to="SDK" data-label="HookJSONOutput" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="218.4675" y1="320" x2="78.4675" y2="320" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="148.4675" y="310" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">HookJSONOutput</text>
</g>
<g class="actor" data-id="SDK" data-label="Agent SDK" data-type="participant">
  <rect x="30.000000000000007" y="30" width="96.93499999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="78.4675" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Agent SDK</text>
</g>
<g class="actor" data-id="Bridge" data-label="SDK Bridge" data-type="participant">
  <rect x="167.036" y="30" width="102.863" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="218.4675" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">SDK Bridge</text>
</g>
<g class="actor" data-id="Bus" data-label="Event Bus" data-type="participant">
  <rect x="311.48199999999997" y="30" width="93.971" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="358.4675" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Event Bus</text>
</g>
<g class="actor" data-id="Reg" data-label="Blocking Registry" data-type="participant">
  <rect x="445.453" y="30" width="138.43099999999998" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="514.6685" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Blocking Registry</text>
</g>
</svg>